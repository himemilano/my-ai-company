name: 🤖 AI App Development Autonomous Operation (One-Shot)

on:
  # ⚠️ アプリ崩壊とAPI消費を防ぐため、定期自動スケジュールは一旦安全に停止します
  # schedule:
  #   - cron: '50 1,5,8 * * *'
  
  workflow_dispatch: # 🎛️ これにより、Matsuiさんがいつでも手動で「1機能ずつ」安全に開発を指示できます

permissions:
  contents: write

jobs:
  run-ai-development:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai crewai langchain-google-genai pydantic

    - name: Run AI App Development
      env:
        # 🛡️ main.py の環境変数存在チェックを通すため
        GEMINI_API_KEY_MY_AI: ${{ secrets.GEMINI_API_KEY_MY_AI }}
        # 🔑 CrewAI / LangChain などの内部ライブラリが要求する標準名称
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_MY_AI }}
      run: python main.py

    - name: Commit and Push Code Progress
      # ✨ main.py が sys.exit(1) で緊急停止した場合は、このコミット処理は走らずに安全にストップします
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "🤖 [アプリ開発部] 実装コードおよび進捗ログを格納し、定時退勤します ($(date))" || echo "変更なし"
        git push
