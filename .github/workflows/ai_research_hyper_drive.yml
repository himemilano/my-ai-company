name: 🤖 AI Research Hyper-Drive Loop

# 古いジョブが動いていれば、新しいジョブは待機（渋滞）させずにその場で即時キャンセル（弾く）
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ai-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🚀 ここで起動する「毎回のコンテナ」に対し、プログラム実行前にcrewaiを含む必要環境を100%確実にデプロイします
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai crewai langchain-google-genai pydantic

    - name: Run AI Research Loop Agent
      env:
        # Secretsに登録されている実際のAPIキー名に合わせてください
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "=== 🤖 AI R&D自律研究ハイパードライブ 起動 ==="
        python ai_loop_runner.py
