name: 🤖 AI Research Hyper-Drive Loop

# === 🛡️ ここが「待機なし・即時弾き」の最強設定 🛡️ ===
concurrency:
  group: ${{ github.workflow }} # このワークフロー単位で競合を監視
  cancel-in-progress: false     # 実行中の古いジョブ（執筆中）を絶対に殺さない！

on:
  schedule:
    - cron: '0 * * * *' # 毎時0分
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ai-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    # 実行中だったらこのジョブ自体をスキップさせる制御
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai

    - name: Run AI Research Loop Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 各リポジトリの正しいキー名に合わせてください
        API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "=== 🤖 自律研究ハイパードライブ 起動 ==="
        python ai_loop_runner.py
