name: AI Company Daily Work

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 日本時間の朝9時に自動起動
  workflow_dispatch: # 手動で「今すぐ動け」ボタンを出す魔法の行

jobs:
  run_ai_company:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 成果物をリポジトリに保存する権限
    steps:
      - name: 1. コードのチェックアウト
        uses: actions/checkout@v4

      - name: 2. Pythonの準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 必要ツールのインストール
        run: |
          pip install "crewai[google-genai]"

      - name: 4. AI社員の業務実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: 5. 成果物のコミットと保存
        run: |
          git config --global user.name "AI Employee"
          git config --global user.email "ai-employee@example.com"
          git add .
          git commit -m "🤖 [AIカンパニー] 本日のアプリ仕様書を納品しました" || echo "変更なし"
          git push
