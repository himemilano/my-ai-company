name: AI App Development Autonomous Operation

on:
  schedule:
    # 毎日 日本時間 10:50, 14:50, 17:50（UTC 1:50, 5:50, 8:50）に自動起動
    - cron: '50 1,5,8 * * *'
  workflow_dispatch: # 会長が手動でいつでも「今すぐ開発を進めろ」と命令できるボタン

jobs:
  run-ai-development:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install crewai langchain-google-genai

    - name: Run AI App Development
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push Code Progress
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "🤖 [アプリ開発部] 18:30定時退勤。本日の実装コードおよび進捗ログを格納しました ($(date))" || echo "変更なし"
        git push
